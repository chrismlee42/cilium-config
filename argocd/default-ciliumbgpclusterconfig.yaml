apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  name: default
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/hostname: chris-pc
  bgpInstances:
  - name: "instance-64513"
    localASN: 64513
    #localPort: 179
    peers:
    - name: "peer-gw01.clee.private.morphacy.net"
      autoDiscovery:
        defaultGateway:
          addressFamily: ipv4
        mode: "DefaultGateway"
      peerASN: 64512
      peerAddress: 192.168.1.1
      peerConfigRef:
        name: "default"
